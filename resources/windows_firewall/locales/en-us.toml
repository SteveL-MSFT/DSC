comInitFailed = "Failed to initialize COM: %{error}"
policyCreateFailed = "Failed to create firewall policy object: %{error}"
getRulesFailed = "Failed to get firewall rules collection: %{error}"
removeFailed = "Failed to remove firewall rule: %{error}"
